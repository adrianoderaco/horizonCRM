<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Horizon Support | Portal do Cliente</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <style>
        body { font-family: 'Manrope', sans-serif; background-color: #f8f9fa; color: #191c1d; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .hidden-view { display: none !important; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #e1e3e4; border-radius: 10px; }
        .typing-dot { animation: typing 1.4s infinite ease-in-out; fill: both; }
        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes typing { 0%, 80%, 100% { transform: scale(0); opacity: 0.3; } 40% { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body class="antialiased min-h-screen flex flex-col">

    <header class="w-full bg-white border-b border-gray-200 p-4 flex justify-between items-center shrink-0 shadow-sm">
        <div class="flex items-center gap-2 font-bold text-blue-700">
            <span class="material-symbols-outlined">cloud</span> Horizon Support
        </div>
        
        <div class="flex items-center border border-gray-200 rounded-lg px-3 py-1">
            <span class="material-symbols-outlined text-gray-400 text-sm mr-1">language</span>
            <select id="client-lang" onchange="clientApp.setLang(this.value)" class="bg-transparent text-xs font-bold text-gray-600 outline-none cursor-pointer">
                <option value="pt">Português</option>
                <option value="en">English</option>
                <option value="es">Español</option>
            </select>
        </div>
    </header>

    <main class="flex-1 flex justify-center items-center p-4 sm:p-8">
        
        <section id="view-contact" class="max-w-4xl w-full space-y-8">
            <div class="bg-white rounded-3xl p-12 text-center shadow-sm border border-gray-200">
                <h2 class="text-4xl font-extrabold tracking-tight mb-4" id="txt-title">Como podemos ajudar?</h2>
                <p class="text-gray-500 mb-8" id="txt-desc">Descreva seu problema para abrir um chamado direto.</p>
                
                <div class="max-w-xl mx-auto flex flex-col gap-4 text-left">
                    <input id="ticket-subject" class="w-full h-14 px-4 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-600 outline-none" placeholder="Assunto" type="text" />
                    <textarea id="ticket-desc" class="w-full p-4 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-600 outline-none resize-none" rows="4" placeholder="Detalhes do problema..."></textarea>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <button onclick="clientApp.openChat()" class="bg-white rounded-3xl p-8 text-left shadow-sm border border-gray-200 hover:border-blue-500 transition-all group">
                    <div class="w-12 h-12 bg-blue-100 text-blue-600 rounded-2xl flex items-center justify-center mb-4"><span class="material-symbols-outlined">forum</span></div>
                    <h3 class="text-xl font-bold" id="txt-btn-chat">Iniciar Chat ao Vivo</h3>
                </button>
                <button onclick="alert('E-mail enviado!')" class="bg-white rounded-3xl p-8 text-left shadow-sm border border-gray-200 hover:border-orange-500 transition-all group">
                    <div class="w-12 h-12 bg-orange-100 text-orange-600 rounded-2xl flex items-center justify-center mb-4"><span class="material-symbols-outlined">mail</span></div>
                    <h3 class="text-xl font-bold" id="txt-btn-email">Enviar E-mail</h3>
                </button>
            </div>
        </section>

        <section id="view-chat" class="hidden-view w-full max-w-3xl h-[80vh] bg-white rounded-3xl shadow-xl border border-gray-200 flex flex-col overflow-hidden relative">
            <header class="p-6 border-b border-gray-100 flex justify-between items-center bg-gray-50 shrink-0">
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center"><span class="material-symbols-outlined text-white">support_agent</span></div>
                    <div>
                        <h1 class="text-lg font-extrabold text-gray-900 leading-none">Suporte Horizon</h1>
                        <div class="flex items-center gap-1.5 mt-1"><span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span><span class="text-xs font-bold text-gray-500" id="txt-status">Agente conectado</span></div>
                    </div>
                </div>
            </header>

            <div id="client-chat-area" class="flex-1 overflow-y-auto p-6 bg-white space-y-6">
                <div id="typing-indicator" class="hidden flex items-start gap-3 mt-4">
                    <div class="bg-gray-100 p-4 rounded-2xl border border-gray-200 flex gap-1 items-center h-[52px]">
                        <div class="w-2 h-2 bg-gray-400 rounded-full typing-dot"></div>
                        <div class="w-2 h-2 bg-gray-400 rounded-full typing-dot"></div>
                        <div class="w-2 h-2 bg-gray-400 rounded-full typing-dot"></div>
                    </div>
                </div>
            </div>

            <footer class="p-4 bg-gray-50 border-t border-gray-100 shrink-0">
                <form id="client-chat-form" class="flex items-end gap-3 bg-white border border-gray-200 rounded-2xl p-2 focus-within:border-blue-500 transition-all">
                    <textarea id="client-msg-input" class="flex-1 bg-transparent border-none outline-none text-sm p-2 resize-none max-h-32 min-h-[44px]" placeholder="Sua mensagem..."></textarea>
                    <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white w-10 h-10 rounded-xl flex items-center justify-center shrink-0 mb-1"><span class="material-symbols-outlined">send</span></button>
                </form>
            </footer>
        </section>
    </main>

    <script>
        const clientApp = {
            lang: 'pt',
            texts: {
                pt: { title: "Como podemos ajudar?", desc: "Descreva seu problema para abrir um ticket.", btnChat: "Iniciar Chat ao Vivo", btnEmail: "Enviar E-mail", status: "Agente conectado", botMsg: "Olá! Estou verificando seu ticket agora mesmo." },
                en: { title: "How can we help?", desc: "Describe your issue to open a direct ticket.", btnChat: "Start Live Chat", btnEmail: "Send Email", status: "Agent connected", botMsg: "Hello! I'm checking your account right now." },
                es: { title: "¿Cómo podemos ayudar?", desc: "Describa su problema para abrir un ticket.", btnChat: "Iniciar Chat en Vivo", btnEmail: "Enviar Correo", status: "Agente conectado", botMsg: "¡Hola! Estoy revisando su cuenta ahora mismo." }
            },

            setLang(l) {
                this.lang = l;
                document.getElementById('txt-title').innerText = this.texts[l].title;
                document.getElementById('txt-desc').innerText = this.texts[l].desc;
                document.getElementById('txt-btn-chat').innerText = this.texts[l].btnChat;
                document.getElementById('txt-btn-email').innerText = this.texts[l].btnEmail;
                document.getElementById('txt-status').innerText = this.texts[l].status;
            },

            openChat() {
                const msg = document.getElementById('ticket-desc').value;
                if(!msg) return alert(this.texts[this.lang].desc);
                document.getElementById('view-contact').classList.add('hidden-view');
                document.getElementById('view-chat').classList.remove('hidden-view');
                this.renderMessage(msg, 'customer');
                this.simulateAgent();
            },

            renderMessage(text, sender) {
                const area = document.getElementById('client-chat-area');
                const isCust = sender === 'customer';
                const badge = (!isCust) ? `<span class="mt-2 text-[9px] opacity-70 flex items-center gap-1 text-gray-500"><span class="material-symbols-outlined text-[11px]">translate</span> Traduzido</span>` : '';
                const html = `
                    <div class="flex items-start gap-3 max-w-[85%] mt-4 ${isCust ? 'ml-auto flex-row-reverse' : ''}">
                        <div class="${isCust ? 'bg-blue-600 text-white rounded-tr-none' : 'bg-gray-100 text-gray-800 rounded-tl-none border border-gray-200'} p-4 rounded-2xl text-sm shadow-sm flex flex-col">
                            <span>${text}</span>
                            ${badge}
                        </div>
                    </div>
                `;
                document.getElementById('typing-indicator').insertAdjacentHTML('beforebegin', html);
                area.scrollTop = area.scrollHeight;
            },

            simulateAgent() {
                const indicator = document.getElementById('typing-indicator');
                indicator.classList.remove('hidden');
                setTimeout(() => {
                    indicator.classList.add('hidden');
                    this.renderMessage(this.texts[this.lang].botMsg, 'agent');
                }, 2000);
            }
        };

        document.getElementById('client-chat-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const input = document.getElementById('client-msg-input');
            if(!input.value.trim()) return;
            clientApp.renderMessage(input.value, 'customer');
            input.value = '';
            clientApp.simulateAgent();
        });
    </script>
</body>
</html>
