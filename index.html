<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Horizon - Customer Support</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <style>
        body { font-family: 'Manrope', sans-serif; background-color: #f1f5f9; color: #0f172a; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 500, 'GRAD' 0, 'opsz' 24; }
        .hidden-view { display: none !important; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        /* Balões de Chat do Cliente */
        .msg-client { background-color: #2563eb; color: white; border-bottom-right-radius: 0; }
        .msg-agent { background-color: white; border: 1px solid #e2e8f0; color: #1e293b; border-bottom-left-radius: 0; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .msg-system { background-color: #e2e8f0; color: #475569; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 800; text-align: center; margin: 1rem auto; border-radius: 1rem; padding: 0.25rem 0.75rem; width: max-content; }
    </style>
</head>
<body class="antialiased min-h-screen flex flex-col relative selection:bg-blue-200">

    <header class="bg-white border-b border-slate-200 sticky top-0 z-50 h-16 flex items-center justify-between px-4 md:px-8 shadow-sm shrink-0">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center shadow-inner">
                <span class="material-symbols-outlined text-white text-xl">cloud</span>
            </div>
            <h1 class="text-xl font-black text-slate-900 tracking-tight" id="ui-title-header">Support</h1>
        </div>
        
        <div class="flex items-center gap-2 bg-slate-50 border border-slate-200 p-1 rounded-full shadow-sm">
            <span class="material-symbols-outlined text-slate-400 text-[16px] ml-2">translate</span>
            <select id="client-language-select" class="bg-transparent text-slate-700 text-xs font-bold px-2 py-1 outline-none cursor-pointer appearance-none">
                <option value="en" selected>English</option>
                <option value="pt">Português</option>
                <option value="es">Español</option>
            </select>
            <span class="material-symbols-outlined text-slate-400 text-[14px] mr-2 pointer-events-none">expand_more</span>
        </div>
    </header>

    <main class="flex-1 flex flex-col relative overflow-hidden items-center p-4 sm:p-8">
        
        <div id="view-start" class="w-full max-w-lg bg-white rounded-3xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-slate-100 flex flex-col overflow-hidden my-auto relative z-10 transition-all duration-300">
            
            <div class="p-8 border-b border-slate-100 bg-slate-50/50">
                <h2 class="text-2xl font-black text-slate-900 mb-2" id="ui-greeting">How can we help?</h2>
                <p class="text-sm font-medium text-slate-500" id="ui-subtitle">Open a new ticket or track an existing request.</p>
            </div>

            <form id="ticket-form" class="p-8 space-y-5">
                <div>
                    <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2" id="ui-label-name">Your Name</label>
                    <input type="text" id="client-name" class="w-full p-3.5 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-600 focus:border-blue-600 font-medium text-sm transition-all" placeholder="John Doe" required />
                </div>
                
                <div>
                    <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2" id="ui-label-email">Your E-mail</label>
                    <input type="email" id="client-email" class="w-full p-3.5 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-600 focus:border-blue-600 font-medium text-sm transition-all" placeholder="john@example.com" required />
                </div>

                <div class="pt-2 border-t border-slate-100" id="new-ticket-fields">
                    <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 mt-3" id="ui-label-subject">Subject</label>
                    <select id="client-subject" class="w-full p-3.5 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-600 focus:border-blue-600 font-bold text-sm text-slate-700 cursor-pointer transition-all" required>
                        <option value="" disabled selected id="ui-option-subject">Select a topic...</option>
                        </select>

                    <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 mt-5" id="ui-label-message">How can we assist you?</label>
                    <textarea id="client-initial-message" class="w-full p-3.5 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-600 focus:border-blue-600 font-medium text-sm resize-none h-28 transition-all" placeholder="Describe your request in detail..." required></textarea>
                </div>

                <button type="submit" id="btn-start" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-lg shadow-blue-600/30 transition-all flex justify-center items-center gap-2 mt-2">
                    <span id="ui-btn-start">Start Chat</span> <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
                </button>
            </form>
            
            <div class="p-6 bg-slate-50 border-t border-slate-100 text-center">
                <button type="button" id="btn-toggle-mode" class="text-xs font-bold text-slate-500 hover:text-blue-600 transition-colors" onclick="clientApp.toggleViewMode()">
                    Already have a ticket? Track here
                </button>
            </div>
        </div>

        <div id="view-chat" class="hidden-view w-full max-w-3xl bg-white rounded-3xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-slate-100 flex flex-col h-[85vh] relative z-10">
            
            <header class="p-5 border-b border-slate-100 flex justify-between items-center bg-slate-50/50 rounded-t-3xl shrink-0">
                <div>
                    <h3 class="font-black text-slate-900 flex items-center gap-2">
                        <span class="relative flex h-3 w-3 mr-1"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span><span class="relative inline-flex rounded-full h-3 w-3 bg-green-500"></span></span>
                        <span id="ui-chat-title">Live Support</span>
                    </h3>
                    <div class="text-[10px] font-bold text-slate-500 mt-1 flex items-center gap-2">
                        <span class="bg-white border border-slate-200 px-2 py-0.5 rounded text-blue-600 font-black tracking-widest uppercase" id="chat-protocol">HZ-0000</span>
                        <span id="chat-subject" class="truncate max-w-[200px]">Subject</span>
                    </div>
                </div>
                <button onclick="clientApp.leaveChat()" class="w-10 h-10 bg-white border border-slate-200 rounded-full flex items-center justify-center hover:bg-slate-100 transition-colors text-slate-500" title="Leave">
                    <span class="material-symbols-outlined text-sm">logout</span>
                </button>
            </header>

            <div id="chat-history" class="flex-1 overflow-y-auto p-6 space-y-6 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] bg-fixed relative">
                <div class="absolute inset-0 bg-white/95 pointer-events-none z-0"></div>
                
                <div class="relative z-10 flex flex-col space-y-4" id="chat-messages-container">
                    </div>
            </div>

            <div id="chat-input-area" class="p-4 bg-white border-t border-slate-100 rounded-b-3xl shrink-0">
                
                <div id="chat-status-bar" class="text-[10px] font-bold text-slate-400 mb-2 px-2 h-4"></div>

                <form id="client-chat-form" class="flex items-end gap-3 relative">
                    
                    <div class="relative group">
                        <input type="file" id="client-file-input" class="hidden-view" accept="image/*,.pdf,.doc,.docx" disabled>
                        <button type="button" id="btn-client-attach" class="h-[52px] w-[52px] bg-slate-50 border border-slate-200 text-slate-500 rounded-2xl hover:bg-blue-50 hover:text-blue-600 hover:border-blue-200 transition-all flex items-center justify-center shrink-0 disabled:opacity-50 disabled:cursor-not-allowed">
                            <span class="material-symbols-outlined text-xl">attach_file</span>
                        </button>
                        <div class="absolute bottom-full left-1/2 transform -translate-x-1/2 mb-2 w-max px-2 py-1 bg-slate-800 text-white text-[10px] font-bold rounded opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none hidden-view" id="attach-tooltip">
                            Attachments disabled
                        </div>
                    </div>
                    
                    <textarea id="chat-input" class="flex-1 bg-slate-50 border border-slate-200 p-4 rounded-2xl outline-none font-medium text-sm resize-none focus:ring-2 focus:ring-blue-600 focus:border-blue-600 transition-all" rows="2" placeholder="Type your message here..." required></textarea>
                    
                    <button type="submit" id="btn-send-msg" class="h-[52px] px-6 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-2xl shadow-lg shadow-blue-600/20 transition-all flex items-center justify-center shrink-0">
                        <span class="material-symbols-outlined">send</span>
                    </button>
                </form>
            </div>

            <div id="view-rating" class="hidden-view absolute inset-0 bg-white/95 backdrop-blur-sm z-50 flex items-center justify-center p-6 rounded-3xl">
                <div class="bg-white border border-slate-200 p-8 rounded-3xl shadow-2xl max-w-md w-full text-center">
                    <div class="w-16 h-16 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-4">
                        <span class="material-symbols-outlined text-3xl">check_circle</span>
                    </div>
                    <h3 class="text-2xl font-black text-slate-900 mb-2" id="ui-rating-title">Ticket Closed</h3>
                    <p class="text-sm font-medium text-slate-500 mb-8" id="ui-rating-desc">How would you rate the support provided?</p>
                    
                    <div class="flex justify-center gap-2 mb-8" id="rating-stars">
                        </div>
                    
                    <button onclick="location.reload()" class="text-sm font-bold text-slate-400 hover:text-slate-600 transition-colors" id="ui-rating-skip">Skip</button>
                </div>
            </div>

        </div>
    </main>

    <script type="module" src="js/client/app.js"></script>
</body>
</html>
